<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0f9ff"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <pattern id="floorGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1000" height="600" fill="url(#bg)"/>
  <rect x="40" y="40" width="920" height="520" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
  <rect x="70" y="70" width="860" height="460" rx="18" fill="none" stroke="#e5e7eb" stroke-width="2"/>

  <!-- door opening (visual) -->
  <rect x="860" y="470" width="80" height="70" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <rect x="875" y="488" width="50" height="34" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>

  <!-- desk row 1 (posY=25 => y=150), centers at x=250/400/550/700 -->
  <g>
    <rect x="185" y="130" width="130" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="335" y="130" width="130" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="485" y="130" width="130" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="635" y="130" width="130" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>

    <circle cx="250" cy="150" r="10" fill="#cbd5e1" opacity="0.45"/>
    <circle cx="400" cy="150" r="10" fill="#cbd5e1" opacity="0.45"/>
    <circle cx="550" cy="150" r="10" fill="#cbd5e1" opacity="0.45"/>
    <circle cx="700" cy="150" r="10" fill="#cbd5e1" opacity="0.45"/>
  </g>

  <!-- central aisle -->
  <rect x="180" y="200" width="640" height="120" rx="22" fill="#eef2ff" opacity="0.9"/>
  <path d="M 180 260 L 820 320" stroke="#e5e7eb" stroke-width="2" opacity="0.35" stroke-dasharray="6 8"/>
  <path d="M 820 260 L 180 320" stroke="#e5e7eb" stroke-width="2" opacity="0.35" stroke-dasharray="6 8"/>

  <!-- desk row 2 (posY=55 => y=330) -->
  <g>
    <rect x="185" y="310" width="130" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="335" y="310" width="130" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="485" y="310" width="130" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="635" y="310" width="130" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>

    <circle cx="250" cy="330" r="10" fill="#cbd5e1" opacity="0.45"/>
    <circle cx="400" cy="330" r="10" fill="#cbd5e1" opacity="0.45"/>
    <circle cx="550" cy="330" r="10" fill="#cbd5e1" opacity="0.45"/>
    <circle cx="700" cy="330" r="10" fill="#cbd5e1" opacity="0.45"/>
  </g>

  <!-- side partitions (visual) -->
  <rect x="95" y="100" width="18" height="380" rx="9" fill="#f8fafc" stroke="#e5e7eb" opacity="0.85"/>
  <rect x="887" y="100" width="18" height="380" rx="9" fill="#f8fafc" stroke="#e5e7eb" opacity="0.85"/>

  <rect x="70" y="70" width="860" height="460" rx="18" fill="url(#floorGrid)" opacity="0.25"/>
</svg>

