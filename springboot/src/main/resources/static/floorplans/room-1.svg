<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <pattern id="floorGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1000" height="600" fill="url(#bg)"/>
  <rect x="40" y="40" width="920" height="520" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
  <rect x="70" y="70" width="860" height="460" rx="18" fill="none" stroke="#e5e7eb" stroke-width="2"/>

  <!-- entrance / door opening -->
  <rect x="850" y="470" width="90" height="70" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <rect x="868" y="488" width="54" height="34" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>

  <!-- desk row 1 (posY=25 => y=150) -->
  <!-- centers at x=200/350/500/650/800 -->
  <g>
    <rect x="140" y="130" width="120" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="290" y="130" width="120" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="440" y="130" width="120" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="590" y="130" width="120" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="740" y="130" width="120" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>

    <!-- chairs (subtle, buttons will overlay) -->
    <circle cx="200" cy="150" r="10" fill="#cbd5e1" opacity="0.45"/>
    <circle cx="350" cy="150" r="10" fill="#cbd5e1" opacity="0.45"/>
    <circle cx="500" cy="150" r="10" fill="#cbd5e1" opacity="0.45"/>
    <circle cx="650" cy="150" r="10" fill="#cbd5e1" opacity="0.45"/>
    <circle cx="800" cy="150" r="10" fill="#cbd5e1" opacity="0.45"/>
  </g>

  <!-- aisle between rows -->
  <rect x="140" y="190" width="720" height="115" rx="18" fill="#eef2ff" opacity="0.9"/>
  <path d="M 140 190 L 860 305" stroke="#e5e7eb" stroke-width="2" opacity="0.35" stroke-dasharray="6 8"/>
  <path d="M 860 190 L 140 305" stroke="#e5e7eb" stroke-width="2" opacity="0.35" stroke-dasharray="6 8"/>

  <!-- desk row 2 (posY=55 => y=330) -->
  <g>
    <rect x="140" y="310" width="120" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="290" y="310" width="120" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="440" y="310" width="120" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="590" y="310" width="120" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="740" y="310" width="120" height="46" rx="12" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>

    <circle cx="200" cy="330" r="10" fill="#cbd5e1" opacity="0.45"/>
    <circle cx="350" cy="330" r="10" fill="#cbd5e1" opacity="0.45"/>
    <circle cx="500" cy="330" r="10" fill="#cbd5e1" opacity="0.45"/>
    <circle cx="650" cy="330" r="10" fill="#cbd5e1" opacity="0.45"/>
    <circle cx="800" cy="330" r="10" fill="#cbd5e1" opacity="0.45"/>
  </g>

  <!-- window style ornaments (visual) -->
  <rect x="80" y="120" width="80" height="60" rx="14" fill="#f1f5f9" stroke="#e5e7eb" stroke-width="2" opacity="0.9"/>
  <rect x="840" y="120" width="80" height="60" rx="14" fill="#f1f5f9" stroke="#e5e7eb" stroke-width="2" opacity="0.9"/>

  <!-- subtle floor grid overlay -->
  <rect x="70" y="70" width="860" height="460" rx="18" fill="url(#floorGrid)" opacity="0.25"/>
</svg>

