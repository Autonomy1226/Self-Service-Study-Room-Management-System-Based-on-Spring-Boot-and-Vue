<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#fef2f2"/>
    </linearGradient>
    <pattern id="floorGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1000" height="600" fill="url(#bg)"/>
  <rect x="40" y="40" width="920" height="520" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
  <rect x="70" y="70" width="860" height="460" rx="18" fill="none" stroke="#e5e7eb" stroke-width="2"/>

  <!-- round table area -->
  <circle cx="500" cy="320" r="190" fill="#fee2e2" stroke="#fecaca" stroke-width="3"/>
  <circle cx="500" cy="320" r="110" fill="#ffffff" stroke="#fca5a5" stroke-width="2" opacity="0.9"/>
  <circle cx="500" cy="320" r="78" fill="#fef2f2" opacity="0.9"/>

  <!-- perimeter ring blocks (visual) -->
  <g opacity="0.55">
    <rect x="250" y="160" width="500" height="320" rx="36" fill="none" stroke="#fecaca" stroke-width="2" stroke-dasharray="10 10"/>
  </g>

  <!-- chairs (posX/posY must match seats on page) -->
  <!-- pos row1 y=30 => cy=180; pos row2 y=60 => cy=360; x=30/50/70 => cx=300/500/700 -->
  <g opacity="0.7" stroke="#ef4444" stroke-width="1.2">
    <rect x="290" y="170" width="20" height="20" rx="6" fill="#f8fafc"/>
    <rect x="490" y="170" width="20" height="20" rx="6" fill="#f8fafc"/>
    <rect x="690" y="170" width="20" height="20" rx="6" fill="#f8fafc"/>
    <rect x="290" y="350" width="20" height="20" rx="6" fill="#f8fafc"/>
    <rect x="490" y="350" width="20" height="20" rx="6" fill="#f8fafc"/>
    <rect x="690" y="350" width="20" height="20" rx="6" fill="#f8fafc"/>
  </g>

  <!-- subtle floor grid -->
  <rect x="70" y="70" width="860" height="460" rx="18" fill="url(#floorGrid)" opacity="0.25"/>
</svg>

